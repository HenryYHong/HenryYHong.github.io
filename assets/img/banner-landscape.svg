<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87c5ff"/>
      <stop offset="70%" stop-color="#cfe9ff"/>
      <stop offset="100%" stop-color="#eaf5ff"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="35%" r="20%">
      <stop offset="0%" stop-color="#fff7b0"/>
      <stop offset="60%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#ffcc33"/>
    </radialGradient>
    <linearGradient id="mountainNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5e6d74"/>
      <stop offset="100%" stop-color="#404b50"/>
    </linearGradient>
    <linearGradient id="mountainFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8aa1ad"/>
      <stop offset="100%" stop-color="#6c818c"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="280" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="900" cy="90" r="55" fill="url(#sunGrad)" opacity="0.95"/>
  <!-- Sun glow -->
  <circle cx="900" cy="90" r="90" fill="#ffd76a" opacity="0.22"/>

  <!-- Distant mountains -->
  <path d="M0 190 L120 160 L220 180 L340 150 L470 175 L600 145 L740 165 L880 150 L1020 175 L1120 165 L1200 180 L1200 280 L0 280 Z"
        fill="url(#mountainFar)"/>

  <!-- Near mountains -->
  <path d="M0 205 L110 185 L220 205 L310 190 L420 210 L520 195 L650 215 L760 200 L880 220 L980 205 L1100 225 L1200 210 L1200 280 L0 280 Z"
        fill="url(#mountainNear)"/>

  <!-- Foreground rolling hills -->
  <path d="M0 230 C150 210, 300 250, 450 230 C650 200, 850 260, 1200 235 L1200 280 L0 280 Z" fill="#2f6d3b" opacity="0.85"/>
  <path d="M0 245 C180 225, 380 265, 600 245 C820 225, 1000 270, 1200 250 L1200 280 L0 280 Z" fill="#3c7f46"/>

  <!-- Minimal text overlay (optional). You can hide by setting opacity to 0 if you prefer image-only) -->
  <g opacity="0.0">
    <text x="48" y="78" font-family="Montserrat, Arial, sans-serif" font-size="26" font-weight="700" fill="#222">Henry Hong</text>
    <text x="48" y="108" font-family="Montserrat, Arial, sans-serif" font-size="16" fill="#333">Engineer • Musician • Educator</text>
  </g>
</svg>


